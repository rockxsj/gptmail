<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>全局收件箱</title>
    <style>
        :root { color-scheme: dark; }
        * { box-sizing: border-box; }
        body { font-family: Inter, system-ui, sans-serif; margin: 0; background: #0b1020; color: #e5e7eb; }
        .wrap { max-width: 1240px; margin: 0 auto; padding: 24px 20px 80px; }
        .card { background: #121a31; border: 1px solid #24304f; border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
        .toolbar { display: grid; grid-template-columns: minmax(260px, 1fr) auto auto; gap: 12px; }
        input, button { border-radius: 10px; border: 1px solid #334155; padding: 10px 14px; }
        input { background: #0f172a; color: #fff; }
        button { background: #2563eb; color: white; cursor: pointer; }
        button.secondary { background: transparent; }
        .status { min-height: 24px; color: #93c5fd; }
        .muted { color: #94a3b8; }
        a { color: #93c5fd; }
        code { background: #0f172a; padding: 2px 6px; border-radius: 6px; }
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 10px; border-bottom: 1px solid #23314f; text-align: left; vertical-align: top; }
        .mobile-list { display: none; }
        .mail-card { display: grid; gap: 10px; padding: 16px 0; border-bottom: 1px solid #23314f; }
        .mail-card:last-child { border-bottom: 0; }
        .mail-card-title { font-weight: 600; }
        .meta-grid { display: grid; gap: 6px; color: #cbd5e1; }
        .meta-line { display: flex; gap: 8px; flex-wrap: wrap; }
        .meta-label { color: #94a3b8; min-width: 56px; }
        .code-pill { display: inline-flex; align-items: center; gap: 8px; padding: 6px 10px; border: 1px solid #334155; border-radius: 999px; background: #0f172a; }
        .inline-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .small-btn { padding: 6px 10px; font-size: 13px; }

        @media (max-width: 768px) {
            .wrap { padding: 16px 12px 60px; }
            .card { padding: 16px; }
            .toolbar { grid-template-columns: 1fr; }
            .desktop-table { display: none; }
            .mobile-list { display: block; }
            h1 { font-size: 22px; }
        }
    </style>
</head>
<body>
<div class="wrap">
    <div class="card">
        <div class="row" style="justify-content: space-between;">
            <div>
                <h1 style="margin: 0 0 8px 0;">全局收件箱</h1>
                <div class="muted">显示整个 <code>{{ mail_domain }}</code> catch-all 域下最近 20 封邮件，支持按收件邮箱筛选。</div>
            </div>
            <div class="row">
                <a href="/">返回首页</a>
                <button id="refreshBtn">刷新</button>
            </div>
        </div>
        <div class="toolbar" style="margin-top: 16px;">
            <input id="recipientFilter" placeholder="按收件邮箱筛选，例如 alpha@ 或 user@{{ mail_domain }}">
            <button id="applyFilterBtn">应用筛选</button>
            <button class="secondary" id="clearFilterBtn">清除筛选</button>
        </div>
        <div id="status" class="status"></div>
    </div>

    <div class="card desktop-table">
        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>主题</th>
                    <th>发件人</th>
                    <th>收件邮箱</th>
                    <th>时间</th>
                    <th>验证码</th>
                    <th></th>
                </tr>
                </thead>
                <tbody id="mailRows">
                <tr><td colspan="6" class="muted">加载中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="card mobile-list">
        <div id="mailCards">
            <div class="muted">加载中...</div>
        </div>
    </div>
</div>
<div id="templateData" data-domain="{{ mail_domain }}"></div>
<script>
const storageKey = 'gptmail_api_key';
const tbody = document.getElementById('mailRows');
const cards = document.getElementById('mailCards');
const statusEl = document.getElementById('status');
const filterInput = document.getElementById('recipientFilter');

function getApiKey() { return localStorage.getItem(storageKey) || ''; }
function setStatus(text) { statusEl.textContent = text || ''; }
function detailHref(email, id) { return '/' + encodeURIComponent(email) + '/' + encodeURIComponent(id); }
function escapeHtml(value) {
    return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
}
function formatLocalDate(isoString) {
    const date = new Date(isoString);
    if (Number.isNaN(date.getTime())) return isoString || '';
    const pad = (n) => String(n).padStart(2, '0');
    return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`;
}
function currentRecipientFilter() { return filterInput.value.trim(); }
async function copyVerificationCode(code) {
    await navigator.clipboard.writeText(code);
    setStatus(`验证码 ${code} 已复制。`);
}
function renderCodeCell(mail) {
    if (!mail.verification_code) return '<span class="muted">—</span>';
    return `<span class="code-pill"><code>${escapeHtml(mail.verification_code)}</code><button class="secondary small-btn" onclick="copyVerificationCode('${mail.verification_code}')">复制验证码</button></span>`;
}
function renderDesktopRows(emails) {
    tbody.innerHTML = emails.map(mail => `
        <tr>
            <td><a href="${detailHref(mail.email_address, mail.id)}">${escapeHtml(mail.subject || '(no subject)')}</a></td>
            <td>${escapeHtml(mail.from_address)}</td>
            <td><a href="/${encodeURIComponent(mail.email_address)}">${escapeHtml(mail.email_address)}</a></td>
            <td title="${escapeHtml(mail.created_at)}">${escapeHtml(formatLocalDate(mail.created_at))}</td>
            <td>${renderCodeCell(mail)}</td>
            <td><button class="secondary small-btn" onclick="deleteMail('${mail.id}')">删除</button></td>
        </tr>
    `).join('');
}
function renderMobileCards(emails) {
    cards.innerHTML = emails.map(mail => `
        <article class="mail-card">
            <a class="mail-card-title" href="${detailHref(mail.email_address, mail.id)}">${escapeHtml(mail.subject || '(no subject)')}</a>
            <div class="meta-grid">
                <div class="meta-line"><span class="meta-label">发件人</span><span>${escapeHtml(mail.from_address)}</span></div>
                <div class="meta-line"><span class="meta-label">收件箱</span><a href="/${encodeURIComponent(mail.email_address)}">${escapeHtml(mail.email_address)}</a></div>
                <div class="meta-line"><span class="meta-label">时间</span><span title="${escapeHtml(mail.created_at)}">${escapeHtml(formatLocalDate(mail.created_at))}</span></div>
                ${mail.verification_code ? `<div class="meta-line"><span class="meta-label">验证码</span><span class="code-pill"><code>${escapeHtml(mail.verification_code)}</code><button class="secondary small-btn" onclick="copyVerificationCode('${mail.verification_code}')">复制验证码</button></span></div>` : ''}
            </div>
            <div class="inline-actions">
                <button class="secondary small-btn" onclick="deleteMail('${mail.id}')">删除</button>
            </div>
        </article>
    `).join('');
}

async function loadAllInbox() {
    const key = getApiKey();
    if (!key) {
        tbody.innerHTML = '<tr><td colspan="6" class="muted">请先回首页保存 API Key。</td></tr>';
        cards.innerHTML = '<div class="muted">请先回首页保存 API Key。</div>';
        setStatus('缺少 API Key');
        return;
    }

    const recipient = currentRecipientFilter();
    const query = recipient ? `?recipient=${encodeURIComponent(recipient)}` : '';
    const response = await fetch(`/api/all-emails${query}`, {
        headers: { 'X-API-Key': key },
    });
    const payload = await response.json();
    if (!response.ok || !payload.success) {
        tbody.innerHTML = `<tr><td colspan="6" class="muted">${payload.error || '加载失败'}</td></tr>`;
        cards.innerHTML = `<div class="muted">${payload.error || '加载失败'}</div>`;
        setStatus(payload.error || '加载失败');
        return;
    }

    const emails = payload.data.emails || [];
    if (!emails.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="muted">没有匹配的邮件。</td></tr>';
        cards.innerHTML = '<div class="muted">没有匹配的邮件。</div>';
        setStatus(`已刷新，当前显示最近 20 封中的匹配结果。今日已用 ${payload.usage.used_today} 次。`);
        return;
    }

    renderDesktopRows(emails);
    renderMobileCards(emails);
    setStatus(`已刷新，显示 ${payload.data.count} 封邮件（最多最近 20 封）。今日已用 ${payload.usage.used_today} 次。`);
}

async function deleteMail(id) {
    const key = getApiKey();
    const response = await fetch(`/api/email/${encodeURIComponent(id)}`, {
        method: 'DELETE',
        headers: { 'X-API-Key': key },
    });
    const payload = await response.json();
    if (!response.ok || !payload.success) {
        setStatus(payload.error || '删除失败');
        return;
    }
    setStatus(payload.data.message);
    await loadAllInbox();
}

document.getElementById('refreshBtn').addEventListener('click', loadAllInbox);
document.getElementById('applyFilterBtn').addEventListener('click', loadAllInbox);
document.getElementById('clearFilterBtn').addEventListener('click', async () => {
    filterInput.value = '';
    await loadAllInbox();
});
filterInput.addEventListener('keydown', async (event) => {
    if (event.key === 'Enter') {
        event.preventDefault();
        await loadAllInbox();
    }
});

loadAllInbox();
window.setInterval(loadAllInbox, 10000);
</script>
</body>
</html>
